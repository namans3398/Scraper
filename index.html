<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; script-src 'self'; require-trusted-types-for 'script';"
    />
    <title>Scraper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div id="homeScreen" class="home-screen">
        <h1 class="home-title">Scraper</h1>
        <div class="home-input-section">
          <input
            type="text"
            id="urlInput"
            placeholder="Paste YouTube URL here..."
            autocomplete="off"
          />
          <button id="fetchBtn">Get Video Info</button>
        </div>
      </div>

      <div id="mainApp" class="main-app hidden">
        <header>
          <h1>Scraper</h1>
          <div class="header-search">
            <input
              type="text"
              id="headerUrlInput"
              placeholder="Paste YouTube URL here..."
              autocomplete="off"
            />
            <button id="headerFetchBtn">Get Video Info</button>
          </div>
        </header>

        <div class="main-content">
          <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Fetching video information...</p>
          </div>

          <div id="videoInfo" class="video-info hidden">
            <div class="left-panel">
              <div class="video-preview-container">
                <div class="video-preview">
                  <div class="thumbnail-frame">
                    <img id="thumbnail" src="" alt="Video thumbnail" />
                    <div class="thumbnail-actions">
                      <button
                        id="downloadThumbnailBtn"
                        class="icon-btn"
                        type="button"
                        title="Download thumbnail"
                        aria-label="Download thumbnail"
                      >
                        <svg
                          width="18"
                          height="18"
                          viewBox="0 0 24 24"
                          aria-hidden="true"
                        >
                          <path
                            d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                          />
                        </svg>
                      </button>
                    </div>
                  </div>
                  <div class="video-details">
                    <h2 id="title"></h2>
                    <p class="channel" id="channel"></p>
                    <div class="video-meta">
                      <span id="duration"></span>
                      <span class="separator">•</span>
                      <span id="views"></span>
                      <span class="separator" id="likesSeparator">•</span>
                      <span id="likes"></span>
                      <span class="separator" id="dateSeparator">•</span>
                      <span id="uploadDate"></span>
                    </div>
                  </div>
                </div>
              </div>

              <div class="video-metadata-container">
                <div class="video-description-section" id="descriptionSection">
                  <button class="description-toggle" id="descriptionToggle">
                    <span>Show Description</span>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                      <path
                        d="M4 6L8 10L12 6"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </button>
                  <div class="video-description hidden" id="description"></div>
                </div>

                <div class="video-tags-section" id="tagsSection">
                  <h3>Tags</h3>
                  <div class="tags-container" id="tags"></div>
                </div>
              </div>
            </div>

            <div class="right-panel">
              <div class="formats-section">
                <h3>Available Formats</h3>
                <div id="formatsList" class="formats-list"></div>
              </div>

              <div class="download-section">
                <div class="folder-select">
                  <input
                    type="text"
                    id="outputPath"
                    placeholder="Select download folder..."
                    readonly
                  />
                  <button id="selectFolderBtn">Browse</button>
                </div>
                <div class="download-buttons">
                  <button id="downloadBtn" class="download-btn" disabled>
                    Download
                  </button>
                  <button id="cancelBtn" class="cancel-btn hidden">
                    Cancel
                  </button>
                </div>
              </div>

              <div id="downloadProgress" class="download-progress hidden">
                <h3>Download Progress</h3>
                <div class="progress-output" id="progressOutput"></div>
              </div>
            </div>
          </div>

          <div id="error" class="error hidden"></div>
        </div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
